name: Build CV

on:
  push:
    branches: [main]
    paths:
      - "main.tex"
  pull_request:
    paths:
      - "main.tex"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install tectonic
        uses: wtfjoke/setup-tectonic@v3

      - name: Build PDF
        run: |
          tectonic main.tex
          mv main.pdf engincan_varan_cv.pdf

      - name: Commit PDF to repo
        if: github.event_name == 'push'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add engincan_varan_cv.pdf
          git diff --staged --quiet || git commit -m "chore: update CV PDF [skip ci]"
          git push

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: engincan_varan_cv
          path: engincan_varan_cv.pdf
          retention-days: 30
